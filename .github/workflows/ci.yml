name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - run: uv python install 3.12
      - run: uv sync --dev
      - name: Lint
        run: uv run ruff check .
      - name: Type-check
        run: uv run mypy src
      - name: Test
        run: uv run pytest -q
  # NOTE: build-time cross-model peer review (author model != reviewer model) is a
  # required gate enforced at PR time — see docs/PEER_REVIEW.md.
