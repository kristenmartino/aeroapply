# Local dev backend: Postgres 16 + pgvector. Mirrors the Railway prod Postgres.
#   docker compose -f infra/docker-compose.yml up -d
#   psql postgresql://aeroapply:aeroapply@localhost:5432/aeroapply -f scripts/bootstrap.sql
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: aeroapply-db
    environment:
      POSTGRES_USER: aeroapply
      POSTGRES_PASSWORD: aeroapply
      POSTGRES_DB: aeroapply
    ports:
      - "5432:5432"
    volumes:
      - aeroapply_pgdata:/var/lib/postgresql/data
      # Schema is applied via Alembic (`uv run alembic upgrade head`), not docker
      # auto-init, so there is one apply path. scripts/bootstrap.sql is the reference.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeroapply -d aeroapply"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aeroapply_pgdata:
