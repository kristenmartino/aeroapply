# AeroApply operator profile & filters — FICTIONAL example template.
# Copy to config/profile.yaml (gitignored) and fill with your real values.
# Concrete PII lives in config/profile.yaml only, never in committed files; every
# value below (name, city, coordinates, salary floor, target titles) is invented.
# More fictional personas for testing live in config/profiles/.

operator:
  name: "Alex Example"
  primary_email: "you@example.com"          # high-priority items are forwarded here
  agent_email: "you.agents@example.com"      # dedicated inbound address (Mailgun/SendGrid route)
  headline: "Business Analyst → Product Manager"
  work_auth: "US Citizen"                     # drives the clearance/visa bouncer gate
  home:
    label: "Springfield, IL"
    lat: 39.7817
    lon: -89.6501

# The "filters" the app sources against.
search_profile:
  name: "PM track"
  locations: ["Remote", "Springfield, IL"]
  distance_miles: 40                          # geo fence for hybrid/onsite
  remote_modes: ["remote", "hybrid"]          # remote | hybrid | onsite
  languages: ["English"]
  salary_floor: 100000                        # evaluated vs the MAX of a posted band
  currency: "USD"
  include_linkedin: true                      # on linkedin / not on linkedin
  exclude_companies: []

# Target role names + alignment multipliers (feed the ranking formula).
target_roles:
  - { title: "Product Manager",      alignment: 1.0 }
  - { title: "Solutions Architect",  alignment: 1.0 }
  - { title: "Business Analyst",     alignment: 0.6 }
  - { title: "Project Manager",      alignment: 0.6 }

# SourcingBouncer edge-filter rules (drop BEFORE any DB write).
bouncer:
  max_commute_miles: 40
  min_salary_floor: 100000
  max_age_days: 45
  # Seniority junk + any industries you want excluded (add your own, e.g. |healthcare|construction).
  drop_title_regex: '\b(junior|associate|entry[\s-]?level|intern(ship)?|graduate)\b'
  legal_blocker_regex: '\b(active ts/sci|top secret|polygraph|clearance required|no c2c|w2 only|us citizens only)\b'

# execution_priority weights (must sum to 1.0 excluding the manual_override trump).
ranking_weights:
  title: 0.35
  location: 0.25
  recency: 0.20
  competition: 0.10
  urgency: 0.10

# WIP scheduler.
scheduler:
  wip_limit: 5            # top-N jobs promoted from Icebox per cycle
  cycle_minutes: 180      # how often the supervisor pulls work

# Autonomy gates (secure-by-default). v1 ships review-and-approve: every submission
# needs operator approval, so the allowlist is empty (block-all) — see docs/adr/ADR-008.
autonomy:
  default_mode: "review"           # review | auto
  auto_submit_sources: []          # [] = nothing auto-submits (v1, ADR-008); post-v1 candidates: Tier A hosted forms
  always_human_sources: ["workday", "taleo", "linkedin", "custom"]  # Tier B
  min_ats_score: 0.90
  min_agent_confidence: 0.95
